<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯血 Cloudflare AI 助手</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            height: 85vh;
        }

        .chat-header {
            background: #f38020;
            color: white;
            padding: 15px 20px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header select {
            padding: 5px 10px;
            border-radius: 5px;
            border: none;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 85%;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-msg {
            background-color: #f38020;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .ai-msg {
            background-color: #f1f1f1;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            font-size: 16px;
        }

        input[type="text"]:focus {
            border-color: #f38020;
        }

        button {
            padding: 12px 20px;
            background-color: #f38020;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #d16b18;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">
            <span>☁️ 纯血 Cloudflare AI</span>
            <select id="modelSelector">
                <option value="@cf/qwen/qwen2.5-7b-instruct-awq">通义千问 Qwen 2.5 7B (中文首选)</option>
                <option value="@cf/qwen/qwen3-30b-a3b-fp8">通义千问 Qwen 3 30B (最新超大杯)</option>
                <option value="@cf/google/gemma-3-12b-it">Google Gemma 3 12B (最新版)</option>
                <option value="@cf/mistral/mistral-small-3.1-24b-instruct">Mistral Small 3.1 24B (最新版)</option>
                <option value="@cf/meta/llama-3.3-70b-instruct">Meta Llama 3.3 70B (强大逻辑)</option>
            </select>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message ai-msg">模型列表已升级至最新！现在可以体验 Gemma 3 和 Mistral 3.1 了，快来试试吧。</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入您的问题..." onkeypress="handleEnter(event)">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ 填入你的 Worker URL (例如: https://cf-ai-backend.xxx.workers.dev)
        // ==========================================
        const WORKER_URL = "https://cf-ai-backend.mj-7f3.workers.dev";

        let messageHistory = [];

        // 切换模型时自动清空记忆
        document.getElementById("modelSelector").addEventListener("change", function () {
            messageHistory = [];
            document.getElementById("chatBox").innerHTML = `<div class="message ai-msg">🔄 已切换至 <b>${this.options[this.selectedIndex].text}</b>。上下文已清空！</div>`;
        });

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const sendBtn = document.getElementById("sendBtn");
            const selectedModel = document.getElementById("modelSelector").value;

            const userText = inputField.value.trim();
            if (!userText) return;

            addMessageToChat("user-msg", userText);
            inputField.value = "";
            messageHistory.push({ role: "user", content: userText });

            const aiMessageDiv = addMessageToChat("ai-msg", "⏳ 边缘节点高速推理中...");
            sendBtn.disabled = true;

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: messageHistory
                    })
                });

                if (!response.ok) throw new Error(`请求失败: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                let aiFullResponse = "";
                let buffer = "";
                aiMessageDiv.innerText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        const trimmedLine = line.trim();
                        if (trimmedLine.startsWith('data: ') && !trimmedLine.includes('[DONE]')) {
                            try {
                                const jsonStr = trimmedLine.slice(6);
                                const data = JSON.parse(jsonStr);

                                // 针对 Cloudflare AI 的格式提取流内容
                                const content = data.response || "";

                                aiFullResponse += content;

                                if (aiFullResponse) {
                                    aiMessageDiv.innerText = aiFullResponse;
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                }
                            } catch (e) {
                                // 忽略解析错误继续运行
                            }
                        }
                    }
                }

                if (aiFullResponse.trim() !== "") {
                    messageHistory.push({ role: "assistant", content: aiFullResponse });
                }

            } catch (error) {
                console.error(error);
                aiMessageDiv.innerText = `❌ 发生错误：${error.message}`;
                messageHistory.pop(); // 报错时移除无效的用户输入记忆
            } finally {
                sendBtn.disabled = false;
                inputField.focus();
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function addMessageToChat(className, text) {
            const chatBox = document.getElementById("chatBox");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        function handleEnter(event) {
            if (event.key === "Enter") sendMessage();
        }
    </script>
</body>

</html>
